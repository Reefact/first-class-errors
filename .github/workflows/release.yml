name: release

on:
  push:
    # Publish on a train-prefixed semantic-version tag. The trains version independently:
    #   lib-v1.2.3  -> FirstClassErrors + FirstClassErrors.Testing + FirstClassErrors.RequestBinder
    #   cli-v1.2.3  -> FirstClassErrors.Cli (the fce .NET tool)
    #   dum-v1.2.3  -> Dummies (the standalone arbitrary-test-value library)
    tags:
      - 'lib-v*.*.*'
      - 'cli-v*.*.*'
      - 'dum-v*.*.*'
  workflow_dispatch:
    inputs:
      component:
        description: 'Which release train to pack/publish'
        type: choice
        options:
          - lib
          - cli
          - dum
        required: true
      version:
        description: 'Package version, without any prefix (e.g. 1.2.3; a dry run can use any SemVer, e.g. 0.0.0-dry.1)'
        required: true
      # release.yml is the only workflow no CI run exercises before a real tag: version resolution,
      # pack, SBOM generation, OIDC and the attestation permissions only ever execute in production
      # conditions. Three defects were found here that were invisible from the repository (the
      # +metadata regex, the nuget.org re-signing mismatch, the dispatch-tag target). Dry run makes
      # all of it testable on demand: everything runs up to AND INCLUDING the attestation and the OIDC
      # login — both deliberately stay in, since OIDC/permission failures are exactly what a dry run
      # rehearses — while the steps that actually publish (the NuGet push, the GitHub Release, and,
      # on the cli train, the error-catalog baseline refresh) are skipped. Defaults to true so an
      # accidental dispatch publishes nothing; publishing requires explicitly unticking it.
      dry_run:
        description: 'Dry run: stop after pack + attestation; skip the publish steps (NuGet push, GitHub Release, cli catalog-baseline refresh)'
        type: boolean
        default: true

# Never publish the same ref twice concurrently.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# Least privilege at the top level: read-only by default. The single job below widens only the write scopes it
# needs, which is what OpenSSF Scorecard's Token-Permissions check rewards (a read-only top level, writes per job).
permissions:
  contents: read

env:
  DOTNET_NOLOGO: 'true'
  DOTNET_CLI_TELEMETRY_OPTOUT: 'true'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 'true'
  NUGET_FEED: 'https://api.nuget.org/v3/index.json'

jobs:
  pack-push:
    name: Pack & push NuGet
    runs-on: ubuntu-latest
    # build + test + pack + attest + push is ~4 min; cap a hung release rather than the 6-hour default.
    timeout-minutes: 20
    permissions:
      # Two uses of the write scope: create the GitHub Release and upload the attested .nupkg/.snupkg as its
      # assets (the publish step), and — on a cli release — push the refreshed error-catalog baseline straight
      # to main (the baseline-refresh step, the one direct-to-main write in this pipeline).
      contents: write
      # Request a GitHub OIDC token, exchanged for a short-lived NuGet API key via trusted publishing
      # (no long-lived NUGET_API_KEY secret is stored).
      id-token: write
      # Store the signed build-provenance attestations in the repository's attestation store,
      # so anyone can verify a released package with `gh attestation verify`.
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          # Full history + tags so tools/packaging/release-notes.sh can resolve the previous
          # same-train tag — the lower bound of the release-notes commit range.
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: '10.0.x'

      - name: Resolve version
        id: version
        shell: bash
        # Read the (attacker-controllable) tag name and manual inputs via the environment rather than interpolating
        # ${{ ... }} straight into the script, and validate the result against a strict SemVer allowlist. A tag such
        # as "lib-v1.2.3;id" is a valid Git ref that matches the release-tag trigger, so an unchecked value could
        # inject shell commands into every step that uses it.
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_COMPONENT: ${{ github.event.inputs.component }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            COMPONENT="$INPUT_COMPONENT"
            VERSION="$INPUT_VERSION"
          else
            # REF_NAME is the train-prefixed tag (e.g. lib-v1.2.3 / cli-v1.2.3): pick the train and strip
            # its prefix. Anything else is not a release tag.
            case "$REF_NAME" in
              lib-v*) COMPONENT="lib"; VERSION="${REF_NAME#lib-v}" ;;
              cli-v*) COMPONENT="cli"; VERSION="${REF_NAME#cli-v}" ;;
              dum-v*) COMPONENT="dum"; VERSION="${REF_NAME#dum-v}" ;;
              *) echo "::error::Tag '$REF_NAME' is not a release tag; expected lib-v*.*.*, cli-v*.*.* or dum-v*.*.*."; exit 1 ;;
            esac
          fi
          case "$COMPONENT" in
            lib|cli|dum) ;;
            *) echo "::error::Invalid component '$COMPONENT'; expected 'lib', 'cli' or 'dum'."; exit 1 ;;
          esac
          # Build metadata (+...) is deliberately REJECTED even though SemVer allows it: NuGet strips it
          # from the package identity, so a tag like lib-v1.2.3+build5 packs as FirstClassErrors.1.2.3.nupkg.
          # If 1.2.3 were already published, the push's --skip-duplicate would then turn this release into
          # a green no-op that publishes nothing. Better to fail loudly here than to "succeed" silently.
          if ! printf '%s' "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'; then
            echo "::error::Invalid version '$VERSION'; expected a SemVer value like 1.2.3 or 1.2.3-beta.1 (build metadata '+...' is not allowed: NuGet drops it from the package identity)."
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "component=$COMPONENT" >> "$GITHUB_OUTPUT"
          echo "Resolved $COMPONENT release version: $VERSION"

      - name: Restore
        run: dotnet restore FirstClassErrors.sln

      - name: Build
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: dotnet build FirstClassErrors.sln -c Release --no-restore -p:Version="$VERSION"

      - name: Test
        run: dotnet test FirstClassErrors.sln -c Release --no-build --logger "console;verbosity=normal"

      # GenDoc ships bundled inside the fce tool (no package of its own -- see pack.sh), so a breaking
      # change to its own error catalog is a breaking change of the cli train. doc/generated/gendoc/
      # accumulates the pending diff against errors-baseline.json (the catalog as of the last cli
      # release) on every pull request -- see gendoc-docs.yml. Enforce it here, once, at the one point a
      # breaking change actually ships: refuse the release unless the version being published bumps the
      # major component over the previous cli-v tag. Runs on a dry run too (everything up to attestation
      # does, per the philosophy above), so a misconfigured or forgotten major bump is caught before a
      # real release attempt, not during one.
      - name: Require a major bump for GenDoc breaking changes
        if: steps.version.outputs.component == 'cli'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          PREFIX="cli-v"
          CURRENT_TAG="${PREFIX}${VERSION}"
          # Same lookup as tools/packaging/release-notes.sh: most recent same-train tag that is not the
          # one being published. Empty on the train's first-ever release.
          PREVIOUS_TAG="$(git tag --list "${PREFIX}*" --sort=-version:refname | grep -Fxv "$CURRENT_TAG" | head -n1 || true)"

          set +e
          dotnet FirstClassErrors.Cli/bin/Release/net8.0/fce.dll catalog diff \
            --assemblies FirstClassErrors.GenDoc/bin/Release/net8.0/FirstClassErrors.GenDoc.dll \
            --baseline doc/generated/gendoc/errors-baseline.json \
            --fail-on breaking
          DIFF_EXIT=$?
          set -e

          if [ "$DIFF_EXIT" -eq 0 ]; then
            echo "ok: GenDoc's error catalog has no breaking change since the last cli release."
            exit 0
          fi
          if [ "$DIFF_EXIT" -ne 2 ]; then
            echo "::error::fce catalog diff failed unexpectedly (exit $DIFF_EXIT); see the output above."
            exit 1
          fi

          # DIFF_EXIT = 2: at least one breaking change. Only acceptable if this release bumps the major
          # version -- the major component is always the first dot-segment, pre-release suffix included.
          if [ -z "$PREVIOUS_TAG" ]; then
            echo "ok: no previous $PREFIX tag; this is the train's first release, nothing to compare the major version against."
            exit 0
          fi
          NEW_MAJOR="${VERSION%%.*}"
          PREVIOUS_VERSION="${PREVIOUS_TAG#"$PREFIX"}"
          PREVIOUS_MAJOR="${PREVIOUS_VERSION%%.*}"

          if [ "$NEW_MAJOR" -le "$PREVIOUS_MAJOR" ]; then
            echo "::error::GenDoc's error catalog has a breaking change since $PREVIOUS_TAG, but $CURRENT_TAG does not bump the major version ($PREVIOUS_MAJOR -> $NEW_MAJOR). Publish $((PREVIOUS_MAJOR + 1)).0.0 instead, or revert the breaking change."
            exit 1
          fi
          echo "ok: GenDoc's error catalog has a breaking change since $PREVIOUS_TAG, matched by the major version bump ($PREVIOUS_MAJOR -> $NEW_MAJOR)."

      # Pack only the train this release targets (lib -> FirstClassErrors + .Testing + .RequestBinder;
      # cli -> the fce tool; dum -> Dummies), so a lib release never republishes the CLI and vice versa.
      # The analyzer is bundled inside the main package and the GenDoc worker inside the CLI tool; the
      # samples are not published.
      # GenerateSBOM activates Microsoft.Sbom.Targets in each packable project: each package embeds its SPDX
      # inventory at _manifest/spdx_2.2/manifest.spdx.json. tools/packaging/pack.sh is the single source of
      # truth (packed projects per train, flags, embedded SBOM, and the SBOM-present check); the
      # release-dryrun workflow calls the same script, so the rehearsal can never drift from the real release.
      - name: Pack
        env:
          VERSION: ${{ steps.version.outputs.version }}
          COMPONENT: ${{ steps.version.outputs.component }}
        run: tools/packaging/pack.sh "$VERSION" "$COMPONENT"

      - name: Upload packages as build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: nupkgs
          # Keep the symbol packages (.snupkg) alongside the .nupkg so a release run's artifacts
          # mirror exactly what is pushed to nuget.org (dotnet nuget push sends both).
          path: |
            artifacts/*.nupkg
            artifacts/*.snupkg
          if-no-files-found: error

      # SLSA build provenance: sign an attestation binding each artifact's SHA-256 to this repository,
      # workflow, commit and runner (via Sigstore + the job's OIDC identity), and store it in the repo's
      # attestation store. The attestation covers the bytes packed HERE — which are published verbatim as
      # GitHub Release assets below. It deliberately does NOT match the nuget.org copy: nuget.org repository-
      # signs every upload (adds a .signature.p7s inside the .nupkg), changing the checksum, so consumers
      # verify provenance against the Release asset and the nuget.org signature via `dotnet nuget verify`.
      # Runs BEFORE both publications on purpose: only attested artifacts are ever released or pushed.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            artifacts/*.nupkg
            artifacts/*.snupkg

      # Trusted publishing: exchange the job's OIDC token for a short-lived, single-use NuGet API key.
      # Requires a trusted publishing policy on nuget.org (owner Reefact / repo first-class-errors /
      # workflow release.yml) for each published package, and the NUGET_USER secret set to the nuget.org
      # account username (profile name, not the email address).
      #
      # This login runs on EVERY trigger, INCLUDING a dry run: the OIDC token exchange is what validates the
      # trusted-publishing policy, so rehearsing it here makes a dry run fail red when the policy or
      # NUGET_USER is missing/misconfigured — instead of only ever finding out during a real release. It
      # mints a short-lived, single-use key that a dry run never spends (the push below is skipped). Only the
      # steps that actually PUBLISH — the push, the GitHub Release, and (on the cli train) the error-catalog
      # baseline refresh — are gated off on a dry run: a tag push always publishes (inputs.* is empty on
      # push, so the event check short-circuits first); a manual dispatch publishes only with dry_run
      # explicitly unticked.
      - name: NuGet login (OIDC)
        id: nuget-login
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # v1
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet
        if: github.event_name == 'push' || inputs.dry_run == false
        env:
          NUGET_API_KEY: ${{ steps.nuget-login.outputs.NUGET_API_KEY }}
        run: |
          dotnet nuget push "artifacts/*.nupkg" \
            --api-key "$NUGET_API_KEY" \
            --source "$NUGET_FEED" \
            --skip-duplicate

      # Publish the exact attested artifacts as GitHub Release assets — the byte-for-byte bytes the
      # provenance attestation covers, so `gh attestation verify <asset>.nupkg` succeeds against them
      # (unlike the nuget.org copy, which is repository-signed). `gh` is preinstalled on the runner, so no
      # extra action is pinned. On a tag push the tag already exists (--target is then ignored); on
      # workflow_dispatch the tag is missing and `gh` would otherwise auto-create it from the DEFAULT
      # branch's latest state — --target "$GITHUB_SHA" pins it to the commit this job actually built and
      # attested, so the release tag, source archive and attested packages all point at the same commit
      # even when dispatched from a hotfix branch or an older SHA. The `|| upload --clobber` fallback
      # keeps a re-run idempotent if the release already exists.
      - name: Publish GitHub Release with attested packages
        if: github.event_name == 'push' || inputs.dry_run == false
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
          COMPONENT: ${{ steps.version.outputs.component }}
        run: |
          # nullglob: a cli release ships no .snupkg (the tool has no symbol package), so the pattern
          # must expand to nothing rather than to a literal path gh would then fail to upload.
          shopt -s nullglob
          TAG="${COMPONENT}-v${VERSION}"
          assets=(artifacts/*.nupkg artifacts/*.snupkg)
          # A SemVer pre-release label (anything after '-') marks the GitHub Release as a pre-release,
          # matching how NuGet lists it, so a preview never shows up as the repo's "Latest" release.
          # Build metadata '+...' is already rejected in "Resolve version", so a '-' here is
          # unambiguously the pre-release separator (-preview.1, -beta.1, -rc.1, ...).
          PRERELEASE=false
          case "$VERSION" in *-*) PRERELEASE=true ;; esac
          # Train-scoped notes (only this train's Conventional Commit scopes) instead of --generate-notes,
          # so a lib release never lists cli commits and vice versa. Pass $GITHUB_SHA — not $TAG — as the
          # range's upper bound: on a workflow_dispatch publish the tag does not exist yet (gh creates it
          # below), so git log must resolve against the commit.
          tools/packaging/release-notes.sh "$COMPONENT" "$TAG" "$GITHUB_SHA" > release-notes.md
          # On a re-run the release already exists, so `gh release create` fails and the fallback runs:
          # `gh release upload` refreshes the assets but cannot change the prerelease flag, so
          # `gh release edit` reconciles it — keeping a repair run idempotent in both directions.
          gh release create "$TAG" "${assets[@]}" \
            --title "$TAG" --notes-file release-notes.md --target "$GITHUB_SHA" --prerelease="$PRERELEASE" \
          || { gh release upload "$TAG" "${assets[@]}" --clobber \
                 && gh release edit "$TAG" --prerelease="$PRERELEASE"; }

      # Closes the loop opened by "Require a major bump...": now that the catalog above has actually been
      # published, explicitly accept it as the new contract (fce catalog update) so the next pull request's
      # diff starts from zero again. Real publishes only -- a dry run must never touch the real baseline.
      # Best-effort: the actual release already succeeded by this point, so a rare race against another
      # push to main (this step pushes directly, the one direct-to-main write in this pipeline, justified
      # because it only ever follows a deliberate, already-published release) degrades to a warning rather
      # than failing an otherwise-successful release; a maintainer can rerun `fce catalog update` by hand.
      - name: Refresh GenDoc's error-catalog baseline
        if: steps.version.outputs.component == 'cli' && (github.event_name == 'push' || inputs.dry_run == false)
        run: |
          set -euo pipefail
          dotnet FirstClassErrors.Cli/bin/Release/net8.0/fce.dll catalog update \
            --assemblies FirstClassErrors.GenDoc/bin/Release/net8.0/FirstClassErrors.GenDoc.dll \
            --baseline doc/generated/gendoc/errors-baseline.json

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ -z "$(git status --porcelain -- doc/generated/gendoc/errors-baseline.json)" ]; then
            echo "Baseline already reflects the published catalog; nothing to refresh."
            exit 0
          fi

          git add doc/generated/gendoc/errors-baseline.json
          git commit -m "docs(gendoc): accept the released error-catalog contract (${{ steps.version.outputs.component }}-v${{ steps.version.outputs.version }})"
          git push origin HEAD:main || echo "::warning::Could not push the refreshed baseline to main (the release itself already succeeded); run 'fce catalog update' by hand."
